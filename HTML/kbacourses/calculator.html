<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>

<body>
    <div class="calc">
        <div class="first">
            <img src="amazon.png" alt="" class="amazon">
            <h6>112 STEPS CHECK & CORRECT</h6>
            <div class="white">
                <h2><sup>01</sup> </h2>
                <h1>1234567890 12.</h1>
            </div>
            <h4>12-Digit</h4>
            <h3>555</h3>
            <img src="power.png" alt="">
        </div>
        <div class="second">
            <div><button class="btn10"></button></div>
            <div class="r0">
                <button class="btn1">𝝅</button>
                <button class="btn1">log</button>
                <button class="btn2">AC</button>
                <button class="btn2">CE</button>

            </div>

            <div class="r1">
                <button class="btn">7</button>
                <button class="btn">8</button>
                <button class="btn">9</button>

            </div>
            <div class="r2">
                <button class="btn">4</button>
                <button class="btn">5</button>
                <button class="btn">6</button>

            </div>
            <div class="r3">
                <button class="btn">1</button>
                <button class="btn">2</button>
                <button class="btn">3</button>

            </div>
            <div class="r4">
                <button class="btn">0</button>
                <button class="btn">00</button>

            </div>
            <ul type="none" class="r5">
                <li> <button class="btn3">RATE</button></li>
                <li><button class="btn3">GST</button></li>
                <li> <button class="btn3">+GST</button></li>
                <li> <button class="btn3">MU</button></li>

        </div>
        </ul>

            <button class="btn7">=</button>
            <button class="btn6">M⩲</button>


        </div>
        <div class="r7">
            <button class="btn7">-</button>
            <button class="btn6">M</button>


        </div>
        <div class="r8">
            <button class="btn7">÷</button>
            <button class="btn6">MRC</button>


        </div>
        <div class="r9">
            <button class="btn7">%</button>
            <button class="btn8">ON</button>


        </div>
        <div class="r10">
            <button class="btn7">√</button>
        </div>
        <div class="r11">
            <button class="btn7">×</button>
        </div>
        <div class="r12">
            <button class="btn9">+</button>
        </div>
    </div>
    </div>
