<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Iterations

    </title>
    <script>
        function basicOperation(){
            let map=new Map()
            map.set('name','Raj')
            map.set('age','10')
            map.set('city','TVM')
            document.getElementById('getname').innerHTML='Name: '+map.get('name')
            document.getElementById('getage').innerHTML='Age: '+map.get('age')
            document.getElementById('getcity').innerHTML='City: '+map.get('city')


            let output=''
            map.forEach((value,key) => {
                output+=key+"="+value+'<br>'
            })
            document.getElementById('output').innerHTML=output

        }
    </script>
</head>
<body>
    <h1>Map Iteration</h1>
    <button onclick="basicOperation()">Start Iteration</button>
    <div id="getname"></div>
    <div id="getage"></div>
    <div id="getcity"></div>
    <div id="output"></div>
</body>
</html>
