    //calculate the root of a quadratic equation.
    let a=1,b=0,c=0
     D = Math.sqrt(b*b-4*a*c)
      if(D==0){
        let root = -b / (2 * a);
        document.write("<br><br>Root = ",root)
    }
    else if(D>0)
    {
        let sqrt_D = Math.sqrt(D);
        let root1 = (-b + sqrt_D) / (2 * a)
        let root2 = (-b - sqrt_D) / (2 * a)
        document.write("<br><br>Root1 = ",root1)
        document.write("<br><br>Root2 = ",root2)

    }
    else
        {
            let sqrt_neg_D = Math.sqrt(-(b*b-4*a*c));
            realPart = -b / (2 * a);
            imaginaryPart = sqrt_neg_D / (2 * a);
            document.write(`<br><br>Root = ${realPart} + ${imaginaryPart}i`)

    }
