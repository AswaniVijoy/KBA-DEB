<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>class7</title>
</head>
<body>
    <script>
        //function definition
        function greet(name){
            document.write("Hello "+name)
        }
        //function call
        greet("Aswani<br>")
        greet("World")
        document.write("<br>")
        document.write("<br><b>Mathematical Operators</b>")
        document.write("<br>")

        //Addition
        function add(a,b){
            return a+b
        }
        sum=add(5,10)
        document.write("<br>Sum = ",sum)
        //Subtraction
        function diff(a,b){
            return a-b
        }
        difference=diff(5,10)
        document.write("<br>Difference = ",difference)
        //Division
        function div(a,b){
            return a/b
        }
        sum=div(5,10)
        document.write("<br>Quotient = ",sum)
        //Multiplication
        function pro(a,b){
            return a*b
        }
        product=pro(5,10)
        document.write("<br>Product = ",product)


        

    </script>
</body>
</html>
