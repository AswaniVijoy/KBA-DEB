<body>
    <script>
        // JS program to find whether the given number is even or odd using ternary operator
        document.write("<br><br><b><font color=blue>JS program to find whether the given number is even or odd using ternary operator </font></b>")
        document.write("<br>")
        document.write("<br>")
        a = 3
        document.write(a % 2 == 0 ? "Given number is even" : "Given number is odd")
        //JS program  to reverse a string using loop
        document.write("<br><br><b><font color=blue>JS program  to reverse a string using loop </font></b>")
        document.write("<br>")
        document.write("<br>")

        str = "flower"
        j = ""
        document.write(str)
        document.write("<br>")
        for (i = 5; i >= 0; i--) {
            j += str[i]

        }
        document.write("The reverse string is ", j)

        //JS program to check eligibility of vote based on age using ternary operator
        document.write("<br><br><b><font color=blue>JS program to check eligibility of vote based on age using ternary operator </font></b>")
        document.write("<br>")
        document.write("<br>")
        age = 19
        document.write(age >= 18 ? "Eligible for voting" : "Not Eligible for voting")



        //JS program to count the number of vowels in string

        document.write("<br><br><b><font color=blue>JS program to count the number of vowels in string </font></b>")
        a = "aswani"
        count = 0
        for (i = 0; i < a.length; i++) {
            if (a[i] == 'a' || a[i] == 'e' || a[i] == 'i' || a[i] == 'o' || a[i] == 'u' || a[i] == 'A' || a[i] == 'E' || a[i] == 'I' || a[i] == 'O' || a[i] == 'U') {
                count++
            }

        }
        document.write("<br>")
        document.write("<br>")
        document.write("Number of vowels=", count)

        //JS program to find sum of digits of number using loop
        document.write("<br><br><b><font color=blue>JS program to fing sum of digits of number using loop </font></b>")
        document.write("<br>")
        document.write("<br>")
        sum = 0
        num = 32
        while (num > 0) {
            digit = num % 10
            sum = sum + digit
            num = num / 10 | 0
        }
        document.write("Sum of digits = ", sum)
        //JS program to check whether the given number is palindrome
        document.write("<br><br><b><font color=blue>JS program to check whether the given number is palindrome </font></b>")
        document.write("<br>")
        document.write("<br>")
        num = 32
        rev = 0
        while (num > 0) {
            digit = num % 10
            rev = rev * 10 + digit
            num = num / 10 | 0
        }
        document.write("Reverse of number = ", rev)
        if (num == rev) {
            document.write("<br>Palindrome")

        }
        else {
            document.write("<br>Not Palindrome")

        }
        //JS program to check whether the given string is palindrome
        document.write("<br><br><b><font color=blue>JS program to check whether the given string is palindrome </font></b>")
        document.write("<br>")
        document.write("<br>")
        str = "malayalam"
        j = ""
        document.write(str)
        document.write("<br>")
        for (i = str.length - 1; i >= 0; i--) {
            j += str[i]

        }
        document.write("The reverse string is ", j)
        if (str == j) {
            document.write("<br>Palindrome")

        }
        else {
            document.write("<br>Not Palindrome")

        }
        //JS program to print numbers from 1 to n:
        // "Fizz" if divisible by 3
        // "Buzz" if divisible by 5
        // "FizzBuzz" if both
        // else print the number
        document.write("<br>")
        document.write("<br>")
        n = 20
        for (i = 1; i <= n; i++) {
            if (i % 3 == 0 && i % 5 == 0) {
                document.write("FizzBuzz ")

            }
            else if (i % 3 == 0) {
                document.write("Fizz ")
            }
            else if (i % 5 == 0) {
                document.write("Buzz ")

            }

            else {
                document.write(i, " ")

            }
        }
        //Write a program that reads one character and prints whether it is:
        // a letter
        // a digit
        // a space
        // or a special character
        document.write("<br>")
        document.write("<br>")
        let ch = " "

        if ((ch >= 'A' && ch <= 'Z') || (ch >= 'a' && ch <= 'z')) {
            document.write("It is a letter");
        }
        else if (ch >= '0' && ch <= '9') {
            document.write("It is a digit");
        }
        else if (ch === ' ') {
            document.write("It is a space");
        }
        else {
            document.write("It is a special character");
        }




        //JS program to count how many consonants appear in a string (only letters a–z). Ignore spaces and punctuation.
        document.write("<br><br><b><font color=blue>JS program to count how many consonants appear in a string (only letters a–z). Ignore spaces and punctuation. </font></b>")
        a = "aswani vijoy!2"
        count = 0
        for (i = 0; i < a.length; i++) {
            if (a[i] >= 'a' && a[i] <= 'z' || a[i] >= 'A' && a[i] <= 'Z') {
                if (a[i] != 'a' && a[i] != 'e' && a[i] != 'i' && a[i] != 'o' && a[i] != 'u' && a[i] != 'A' && a[i] != 'E' && a[i] != 'I' && a[i] != 'O' && a[i] != 'U') {
                    count++
                }
            }
        }
        document.write("<br>")
        document.write("<br>")
        document.write("Number of consonants=", count)
        //Write a program to capitalize first letter in every word of a sentence using string handling functions
        document.write("<br><br><b><font color=blue>Write a program to capitalize first letter in every word of a sentence using string handling functions</font></b>")
        document.write("<br>")
        document.write("<br>")
        string = "i love my country"
        words = string.split(" ")
        result = ''
        for (i = 0; i < words.length; i++) {
            result = result + words[i][0].toUpperCase() + words[i].slice(1) + " "
        }
        document.write(result)



        //Write a program to read a value “abcd23ef78gh98za” . From this, remove digits and print only the characters
        document.write("<br><br><b><font color=blue>Write a program to read a value “abcd23ef78gh98za” . From this, remove digits and print only the characters</font></b>")
        document.write("<br>")
        document.write("<br>")
        a = "abcd23ef78gh98za"

        for (i = 0; i < a.length; i++) {
            if (!(a[i] >= '0' && a[i] <= '9')) {
                document.write(a[i])
            }
        }


        //JS program to print prime numbers between 10 and 30
        document.write("<br><br><b><font color=blue>JS program to print prime numbers between 10 and 30 </font></b>")
        document.write("<br>")
        document.write("<br>")
        for (num = 10; num <= 30; num++) {

            flag = 0;

            for (i = 2; i < num; i++) {
                if (num % i == 0) {
                    flag = 1;
                    break;
                }
            }

            if (flag == 0 ) {
                document.write(num , " ");
            }
        }

        //Generate fibonacci series upto 11
        document.write("<br><br><b><font color=blue>Generate fibonacci series upto 11 </font></b>")
        document.write("<br>")
        document.write("<br>")

        a = 0
        b = 1
        document.write(a, " ", b, " ");
        i = 0
        while (i < 5) {
            fib = a + b
            document.write(fib, " ")
            a = b
            b = fib
            i++

        }
        //Consider an array [2,3,-4,0,-2,-6,7,8,9]. Count the number of positive,negative and zeros in this array.
        document.write("<br><br><b><font color=blue>Consider an array [2,3,-4,0,-2,-6,7,8,9]. Count the number of positive,negative and zeros in this array. </font></b>")
        document.write("<br>")
        document.write("<br>")
        a = [2, 3, -4, 0, -2, -6, 7, 8, 9]
        count1 = 0
        count2 = 0
        count3 = 0
        for (i = 0; i < a.length; i++) {
            if (a[i] > 0) {
                count1 = count1 + 1
            }
            else if (a[i] < 0) {
                count2 = count2 + 1
            }
            else {
                count3 = count3 + 1
            }





        }
        document.write("Number of positive numbers ", count1)
        document.write("<br>")

        document.write("Number of negetive numbers ", count2)
        document.write("<br>")

        document.write("Number of zeroes ", count3)

        //JS program to create the pattern
        document.write("<br><br><b><font color=blue>JS program to create the pattern </font></b>")

        document.write("<br>")
        document.write("<br>")

        //Pattern1
        for (i = 0; i < 4; i++) {
            for (j = 0; j <= i; j++) {
                document.write(j + 1, " ")
            }
            document.write("<br>")

        }
        //Pattern2
        document.write("<br>")
        document.write("<br>")


        for (i = 1; i <= 5; i++) {
            for (j = 5; j >= i; j--) {
                document.write("* ")

            }
            document.write("<br>")
        }

        document.write("<br>")
        document.write("<br>")
        //Pattern3

        for (i = 0; i < 4; i++) {
            for (j = 0; j < 4; j++) {
                document.write(i + 1, " ")
            }
            document.write("<br>")

        }
        document.write("<br>")
        document.write("<br>")
        //Pattern4
        n = 1
        for (i = 0; i < 4; i++) {
            for (j = 0; j <= i; j++) {
                document.write(n, " ")
                n++
            }
            document.write("<br>")

        }

    </script>
